<script type="text/markdown" data-id="1.1" data-ch="1" data-title="Cos'è Claude?">
# 1.1 Cos'è Claude?

*(10 minuti)*

Claude è più di un chatbot: è un assistente IA pensato per essere il tuo partner di pensiero. In questa lezione scoprirai cosa rende Claude diverso dagli altri strumenti di IA e vedrai come può aiutarti in una vasta gamma di attività lavorative.

## Punti chiave

- **Utile, innocuo e onesto.** Claude è guidato da principi che lo aiutano a evitare output tossici o discriminatori, a evitare di assistere in attività illegali o non etiche, e a comportarsi in generale come un sistema utile, onesto e innocuo. Questo approccio, chiamato Constitutional AI, fa sì che Claude sia addestrato ad allinearsi ai valori umani e a operare in modo trasparente.
- **Più di un chatbot.** Claude gestisce in modo affidabile un'ampia varietà di attività conversazionali e di elaborazione testi: riassunti, ricerca, scrittura creativa e collaborativa, domande e risposte, programmazione e altro ancora. Pensa a Claude come a un partner di pensiero per problemi complessi, non solo per domande semplici.
- **Guidabile e collaborativo.** Claude accetta indicazioni su personalità, tono e comportamento, così ottieni l'output desiderato con meno sforzo.
- **Disponibile ovunque tu lavori.** Le app Claude sono disponibili su tutti i piani (Free, Pro, Max, Team, Enterprise). Conversazioni, progetti, memoria e preferenze si sincronizzano tra i dispositivi: web, desktop e mobile.

## Capire le capacità di Claude

Claude va ben oltre la semplice domanda-risposta, offrendo una collaborazione simile a quella di un assistente che può sia automatizzare sia potenziare il tuo lavoro:

- **Scrittura e creazione di contenuti:** post social, email professionali, report complessi — perfezionando struttura e tono finché non emerge la tua voce.
- **Ricerca e analisi:** esplora angolazioni diverse, raccoglie risultati, analizza dati. La grande finestra di contesto di Claude assorbe oltre 200K token (circa 500 pagine), fino a 1M di token sui piani Pro, Max, Team ed Enterprise sui modelli supportati.
- **Assistenza alla programmazione:** scrive, esegue debug e spiega codice in molti linguaggi — uno dei maggiori punti di forza di Claude.
- **Risoluzione di problemi e ragionamento:** compiti cognitivi complessi, matematica, strategia. I modelli Opus e Sonnet recenti sono ibridi: risposte quasi istantanee oppure pensiero esteso per un ragionamento più approfondito, passo dopo passo.
- **Imparare cose nuove:** Claude si adatta al tuo ritmo. La modalità apprendimento guida il tuo ragionamento invece di darti semplicemente le risposte.

## Modi per accedere a Claude

Claude è l'intelligenza: l'assistente IA che stai imparando a usare. Quella stessa intelligenza è disponibile su più interfacce:

- **Claude.ai** (più le app mobile e desktop) — il modo principale con cui la maggior parte delle persone lavora con Claude: domande, brainstorming, creazione e modifica di documenti. Il focus di questo corso.
- **Claude Code** — uno strumento di programmazione agentico per sviluppatori (e per ogni tipo di manipolazione di file): modifica file, esegue comandi, crea commit.
- **@Claude in Slack** — chatta in qualsiasi canale o menziona @Claude nei thread; cerca nel tuo spazio di lavoro per trovare contesto.
- **Claude Design** — trasforma idee, bozze o screenshot in prototipi interattivi.
- **Claude per Microsoft 365** — Claude dentro Excel, PowerPoint, Word e Outlook come barra laterale.

## Riflessione sulla lezione

Quali attività nel tuo lavoro attuale potrebbero beneficiare di avere Claude come partner di pensiero? Guarda il tuo calendario (o chiedilo a Claude) e individua alcune attività da provare.
</script>

<script type="text/markdown" data-id="1.2" data-ch="1" data-title="La tua prima conversazione">
# 1.2 La tua prima conversazione

[Video: Iniziare con Claude.ai](https://www.youtube.com/watch?v=0vZ_UVLhSQQ)

## Punti chiave

- Claude porta l'intelligenza IA; **tu porti il contesto e la competenza** che rendono il lavoro significativo.
- Parla con Claude come con un collega — in modo naturale, conciso, colloquiale.
- Prima della tua prossima conversazione: **imposta il contesto** (ruolo, obiettivi, contesto), **definisci il compito** (l'azione che vuoi) e **specifica le regole** (stile, tono, esempi).
- Carica i documenti rilevanti così Claude considera quel contenuto — una scorciatoia per capire le tue esigenze.
- Il vero potere viene da una comunicazione continua e frequente, non da prompt isolati.

## Scrivere prompt efficaci

Tutte le interazioni iniziano con un prompt, e i prompt (combinati con altro contesto) modellano la risposta di Claude. Un buon prompt considera tre cose:

- **Impostare il contesto:** il tuo ruolo e i tuoi obiettivi; il contesto che Claude dovrebbe conoscere.
- **Definire il compito:** l'azione che vuoi — scrivere, analizzare, costruire, altro.
- **Specificare le regole:** lo stile o il tono; esempi che mostrano cosa cerchi.

### Mettere tutto insieme

Un esempio che usa tutti e tre gli elementi:

> Sono la responsabile marketing di una startup indie di streaming, e stiamo preparando un pitch deck per gli investitori del Series A. Puoi fare una ricerca sullo stato attuale del mercato dello streaming di film indipendenti e individuare le tendenze chiave, il posizionamento dei concorrenti e le opportunità di crescita? Usa una ricerca web aggiornata con citazioni e struttura il tutto come un report professionale di massimo 5 pagine, con un riepilogo esecutivo, analisi di mercato, panorama competitivo e opportunità di crescita.

Questo framework è adattato dal **4D Framework per la Fluency nell'IA** — Delega, Descrizione, Discernimento e Diligenza.

## Aggiungere contesto

Claude può analizzare testo e contenuti visivi (immagini, grafici) in PDF e documenti. I tipi supportati includono PDF, DOCX, CSV, TXT e formati immagine comuni come PNG e JPEG. Usi pratici:

- Carica un documento e chiedi a Claude di riassumere i punti chiave
- Condividi un'immagine e chiedi a Claude di descriverla o analizzarla
- Allega un foglio di calcolo e chiedi a Claude di individuare le tendenze
- Carica del codice e chiedi a Claude di spiegarlo o trovare bug

> Consiglio: Impostazioni > Generali > "Quali preferenze personali dovrebbe considerare Claude?" imposta preferenze che si applicano a ogni conversazione.

## Iterare sulle risposte

Le conversazioni sono pensate per essere iterative. Se la prima risposta non è quella giusta, hai delle opzioni:

- **Fai domande di approfondimento:** "Puoi espandere il secondo punto?" oppure "Rendilo più conciso."
- **Fornisci un feedback:** "Va bene, ma il tono è troppo formale. Rendilo più colloquiale."
- **Reindirizza o ricomincia:** "In realtà, stavo chiedendo di X, non di Y." Nel peggiore dei casi, avvia una nuova chat per azzerare completamente il contesto.

> Consiglio: Clicca sull'icona della matita su uno dei tuoi messaggi per modificarlo e reinviarlo — utile per affinare la tua richiesta invece di aggiungere un nuovo messaggio.

## Personalizzare Claude

- La **Memoria** salva automaticamente il contesto chiave — il tuo ruolo, le preferenze, le decisioni passate, il tuo stile di lavoro — così non devi ripeterti a ogni nuova chat. Rivedi, modifica o elimina qualsiasi cosa nelle Impostazioni; si sincronizza tra i dispositivi.
- Gli **Stili** personalizzano il modo in cui Claude comunica. Scegli tra preset (conciso, formale, esplicativo) oppure creane uno tuo descrivendo esattamente come vuoi che Claude scriva; si applica a tutte le conversazioni.
</script>

<script type="text/markdown" data-id="1.3" data-ch="1" data-title="Ottenere risultati migliori">
# 1.3 Ottenere risultati migliori

Mentre lavori con Claude, incontrerai momenti in cui la risposta non è quella che ti aspettavi. È normale — ed è un'opportunità per affinare il tuo approccio.

## Sfide comuni e come risolverle

- **Risposta troppo generica** — al tuo prompt mancava il contesto. Aggiungi dettagli sul tuo pubblico, ruolo o vincoli. Invece di "Scrivi un'email sul ritardo del progetto," descrivi il cliente, la situazione e il tono che ti serve.
- **Troppo lunga o troppo corta** — sii esplicito: "Dammi un riassunto di due paragrafi," "Mantienilo sotto le 100 parole," oppure "Mi serve un'analisi completa — la lunghezza non è un problema."
- **Formato sbagliato** — mostra, non solo dire. Fornisci un esempio, o descrivi la struttura: "Usa elenchi puntati con intestazioni in grassetto per ogni sezione."
- **Informazioni sicure ma sbagliate** — Claude può generare fatti plausibili ma non corretti, specialmente su argomenti di nicchia. Per lavori ad alto rischio, verifica i fatti chiave in modo indipendente, chiedi fonti o livelli di confidenza, e attiva la ricerca web per ancorare le risposte a informazioni aggiornate.
- **Il tono non è giusto** — descrivilo chiaramente: "Rendi questo più colloquiale" oppure "Questo dovrebbe suonare autorevole e formale." Fornisci un esempio nello stile che desideri.

## La mentalità dell'iterazione

Il tuo primo prompt raramente produce un risultato perfetto — e va bene così. Pensalo come l'inizio di una conversazione, non come una richiesta unica. Gli utenti efficaci:

- Trattano le prime bozze come punti di partenza — rivedono, individuano cosa funziona, poi affinano.
- Danno un feedback specifico. "Taglia i primi due paragrafi e rendi la conclusione più orientata all'azione" batte "rendilo più corto."
- Sanno quando ripartire da zero. A volte una nuova chat con un prompt più chiaro è più veloce che reindirizzare.

## Cos'è l'AI Fluency?

L'AI Fluency è la capacità di collaborare efficacemente con l'IA — non solo quali pulsanti premere, ma il giudizio per usare bene l'IA in situazioni diverse. Il **4D Framework** individua quattro competenze che lavorano insieme:

- **Delega:** decidere quale lavoro viene svolto dagli umani, quale dall'IA, e come distribuirlo.
- **Descrizione:** comunicare chiaramente con l'IA — definire gli output, guidare il processo, specificare il comportamento.
- **Discernimento:** valutare criticamente output, processi e qualità dell'IA; decidere cosa migliorare.
- **Diligenza:** usare l'IA in modo responsabile ed etico — trasparenza e responsabilità per il lavoro assistito dall'IA.

Il framework per i prompt della Lezione 1.2 (imposta il contesto, definisci il compito, specifica le regole) si radica nella Descrizione; le tecniche di risoluzione dei problemi sopra attingono a Discernimento e Diligenza.

## Valutare Claude per i tuoi flussi di lavoro

Come sai se Claude è davvero bravo in un compito specifico? È qui che entrano in gioco le **valutazioni** (evals) — modi sistematici per testare le prestazioni su compiti che contano per te. Non serve un'infrastruttura complessa:

1. **Raccogli esempi.** Raccogli 5-10 esempi di un compito che svolgi regolarmente — email, report, analisi.
2. **Crea prompt di test.** Scrivi prompt che genererebbero output simili, con il contesto che avresti naturalmente.
3. **Confronta gli output.** Claude coglie le informazioni chiave? Il tono e lo stile sono appropriati? Cosa manca?
4. **Affina il tuo approccio.** Modifica i prompt, aggiungi esempi di come dovrebbe apparire un buon risultato, o individua dove la revisione umana è essenziale.
</script>

<script type="text/markdown" data-id="1.4" data-ch="1" data-title="L'app desktop: Chat, Cowork, Code">
# 1.4 L'app desktop: Chat, Cowork, Code

L'app desktop di Claude offre tre modi di lavorare: **Chat**, **Cowork** e **Code** — da domande veloci a ricerche complesse fino alla creazione di software.

Cowork e Code girano sullo stesso motore — entrambi sono **Claude Code** sotto il cofano: locale sulla tua macchina, capace di lavoro indipendente, in grado di avviare sub-agent e sostenere compiti lunghi. Ogni modalità è progettata attorno al lavoro che serve.

## Chat

Lo stesso Claude che conosci da claude.ai, più alcune cose che derivano dall'esecuzione nativa sul tuo computer:

- **Accesso rapido.** Doppio tocco sul tasto Option (Mac) per richiamare Claude sopra qualsiasi cosa tu stia facendo, in una finestra compatta che resta in primo piano mentre cambi app.
- **Screenshot e condivisione finestre.** Lascia che Claude veda esattamente cosa c'è sul tuo schermo — più veloce e preciso che descriverlo (Mac).
- **Dettatura.** Parla di un problema invece di scriverlo (Mac).
- **Connettori desktop.** Collega strumenti e servizi locali così Claude può lavorare con altri strumenti sulla tua macchina.

Chat eccelle quando devi fare domande, fare brainstorming, scrivere bozze o lavorare avanti e indietro sui problemi.

## Cowork

Costruito per un lavoro che richiede impegno reale: estrarre informazioni da molte fonti, dargli un senso, e produrre qualcosa di finito. Claude può gestire più attività contemporaneamente, attingendo da più fonti con la resistenza per portarle a termine. Prima di iniziare, spesso pone una breve serie di domande per definire ambito, formato e vincoli, poi costruisce un piano che puoi rivedere.

- **Accesso alle cartelle.** Indica a Claude una cartella; legge ciò che è rilevante e salva il lavoro finito nello stesso posto.
- **Attività pianificate.** Lavoro ricorrente — un briefing giornaliero da Slack e calendario, un riepilogo settimanale, il triage mattutino della posta.
- **Sub-agent.** Lavoratori in background che Claude avvia per gestire parti di un compito in parallelo, poi coordina in un unico risultato.
- **Dispatch.** Continua le conversazioni Cowork dal telefono (richiede app desktop + mobile, computer acceso).
- **Progetti.** Raggruppa attività correlate in spazi di lavoro con propri file, contesto, istruzioni e memoria — locali sul tuo desktop.
- **Uso del browser.** Collega Claude in Chrome per navigare i siti e portare i risultati nel compito.
- **Uso del computer.** Quando non c'è un connettore, Claude naviga direttamente sul tuo computer — cliccando, digitando, aprendo app. Ordine di priorità: connettori → Chrome → interazione con lo schermo. (Anteprima di ricerca, Pro/Max, macOS.)
- **Plugin.** Aggiungi capacità come dati finanziari in tempo reale o ricerca nella conoscenza interna.
- **Ambiente protetto.** Cowork gira in uno spazio contenuto — può leggere, creare e modificare solo all'interno delle cartelle che condividi.

Cowork è disponibile per gli utenti Pro, Max, Team ed Enterprise.

## Code

La scheda Code offre tutta la potenza di Claude Code dentro l'app desktop — un ambiente di sviluppo completo. Claude lavora direttamente nel tuo codebase: legge, scrive e modifica codice, esegue comandi. Diff visivi mostrano cosa è cambiato, un terminale integrato mostra i comandi mentre vengono eseguiti, e git traccia ogni versione così puoi tornare indietro.

- **Locale:** Claude lavora direttamente con i file sulla tua macchina e può eseguire un server di sviluppo che visualizzi nel browser.
- **Remoto:** collega un repository GitHub e Claude lavora in un ambiente cloud; le sessioni continuano anche se chiudi l'app.

Tre modalità di interazione controllano quanto Claude fa in autonomia:

- **Ask:** Claude propone ogni modifica e aspetta l'approvazione — rivedi un diff visivo, accetta o rifiuta.
- **Code:** Claude applica le modifiche ai file automaticamente ma controlla prima di eseguire comandi da terminale.
- **Plan:** Claude delinea il suo intero approccio prima di toccare qualsiasi cosa.

La scheda Code è disponibile per gli utenti Pro, Max, Team ed Enterprise.

## Confronto tra le tre modalità

- **Chat** — ottimizzata per scambi più rapidi: esplorare idee, bozze iterative, risposte veloci, apprendimento tramite dialogo. Extra chiave: accesso rapido, dettatura. Strumenti: connettori, Skill, Claude in Chrome.
- **Cowork** — ottimizzato per lavoro complesso o prolungato: ricerca, analisi, organizzazione file, documenti e output finiti. Funzionalità chiave: cartelle locali, plugin, sub-agent, attività pianificate. Strumenti: connettori (locali + remoti), Skill, Chrome, plugin, uso del computer.
- **Code** — ottimizzato per costruire software: scrivere, testare, eseguire e distribuire codice. Funzionalità chiave: modalità Ask/Code/Plan, diff visivi, integrazione git, ambienti locali + remoti. Strumenti: connettori, Skill, Chrome, plugin, hook.
</script>

<script type="text/markdown" data-id="2.1" data-ch="2" data-title="Introduzione ai Progetti">
# 2.1 Introduzione ai Progetti

[Video](https://www.youtube.com/watch?v=GJ5jTgcbRHA)

## Punti chiave

- I Progetti sono **spazi di lavoro autonomi** con propria memoria, cronologie chat, basi di conoscenza e istruzioni personalizzate.
- La **conoscenza del progetto** ti permette di caricare documenti che Claude referenzia in tutte le chat di quel progetto — niente più ricaricamenti degli stessi file.
- Le **istruzioni di progetto** guidano il comportamento di Claude (tono, competenza, stile di risposta) per ogni conversazione nel progetto.
- I Progetti scalano automaticamente: vicino ai limiti di contesto, Claude attiva la **RAG** per espandere la capacità fino a 10 volte mantenendo la qualità.
- Per Claude for Work, i Progetti abilitano la **collaborazione** — condividi contesto, istruzioni e conoscenza accumulata con i colleghi.

## Quando usare i Progetti

I Progetti sono utili per lavoro continuativo, non per domande isolate. Considerane uno quando hai:

- Materiali di riferimento che riutilizzerai (note di riunione, risultati di sondaggi, report, dati storici)
- Requisiti coerenti su come Claude dovrebbe rispondere (sempre formale, sempre citare le fonti, sempre seguire un modello)
- Collaborazione di team dove più persone dovrebbero lavorare sulla stessa base

## Creare il tuo primo progetto

1. **Configurazione.** Barra laterale > "Progetti" (o claude.ai/projects) > "+ Nuovo Progetto." Dagli un nome descrittivo e una breve descrizione, e scegli la visibilità (privato, o condiviso con la tua organizzazione).
2. **Aggiungi istruzioni.** Di' a Claude come comportarsi in tutte le conversazioni: contesto sul lavoro, istruzioni di processo, tono e stile, e requisiti specifici. Puoi anche automatizzare flussi di lavoro — "Quando carico una trascrizione di riunione, crea un riassunto strutturato usando questo modello."
3. **Costruisci la tua base di conoscenza.** Carica documenti che Claude dovrebbe referenziare (PDF, DOCX, CSV, TXT, HTML e altro) o collega Google Drive. Aggiungi documenti di riferimento, materiali di background, esempi da emulare e specifiche tecniche.

> Consiglio: Dai ai file nomi descrittivi — "Linee-Guida-Brand-Q4-2024.pdf" batte "documento1.pdf." Claude usa i nomi dei file per recuperare le informazioni giuste.

## Basi di conoscenza estese (RAG)

Quando la conoscenza di progetto si avvicina al limite della finestra di contesto, Claude attiva la **Retrieval Augmented Generation**: invece di caricare tutto in memoria, cerca e recupera solo le parti più rilevanti quando risponde. Questo espande la capacità fino a 10 volte mantenendo la qualità. Vedrai un indicatore visivo quando la RAG è attiva — ma l'esperienza rimane la stessa.

## Collaborazione

Per i piani Team ed Enterprise, condividere un progetto offre tre livelli di permesso:

- **Può visualizzare:** vede i contenuti, accede alla conoscenza e chatta — ma nessuna modifica (sola lettura con diritto di discussione).
- **Può modificare:** modifica le istruzioni, aggiorna la conoscenza, gestisce i membri, contribuisce attivamente.
- **Proprietario:** controlla tutto, incluso chi vede il progetto.

Condividi tramite il pulsante "Condividi progetto" — aggiungi membri per nome o email, oppure condividi con "Tutti in [la tua organizzazione]." I membri trovano i progetti condivisi sotto "Condivisi con me."

## Best practice

- **Inizia focalizzato, poi espandi.** Comincia con un caso d'uso specifico invece di un progetto per tutto.
- **Mantieni la base di conoscenza aggiornata.** Documenti obsoleti portano a risposte obsolete.
- **Scrivi istruzioni chiare e specifiche.** Istruzioni vaghe portano a risultati incoerenti.
- **Dai nomi descrittivi ai documenti** e raggruppa i file correlati — Claude usa i nomi dei file e la vicinanza per capire le relazioni.
- **Fai riferimento ai documenti per nome** nei tuoi prompt: "In base al nostro report Q3, quali erano le principali preoccupazioni dei clienti?"
</script>

<script type="text/markdown" data-id="2.2" data-ch="2" data-title="Creare con gli Artifact">
# 2.2 Creare con gli Artifact

## Cosa sono gli artifact?

Gli artifact sono output autonomi e interattivi che Claude crea in una finestra dedicata accanto alla conversazione. Invece di un lungo blocco di codice o testo sepolto nella chat, vedi il tuo contenuto renderizzato e pronto all'uso — un sito web funzionante, un grafico interattivo, un documento scaricabile.

Claude crea automaticamente un artifact quando il contenuto è:

- Significativo e autonomo (in genere oltre 15 righe)
- Qualcosa che probabilmente modificherai, itererai o riutilizzerai
- Contenuto complesso che sta in piedi da solo senza la conversazione circostante
- Contenuto che vorrai referenziare o usare più avanti

## Tipi comuni di artifact

- **Documenti** (markdown, testo semplice, Word, PDF, PowerPoint, Excel) — report, note di riunione, piani di progetto, articoli di blog.
- **Snippet di codice** — codice funzionante in qualsiasi linguaggio, da vedere, copiare o scaricare.
- **Pagine HTML** — pagine complete (HTML/CSS/JS in un unico file) per landing page, moduli, demo, prototipi.
- **Immagini SVG** — loghi, icone, illustrazioni, renderizzate direttamente nella finestra artifact.
- **Diagrammi Mermaid** — diagrammi di flusso, diagrammi di sequenza, diagrammi di Gantt, organigrammi.
- **Componenti React** — UI interattive con logica reale: calcolatrici, dashboard, giochi, visualizzazioni di dati.

## Creare il tuo primo artifact

Descrivi semplicemente cosa vuoi. Per esempio:

- "Costruisci una dashboard interattiva che mi permetta di inserire le spese mensili e vedere una ripartizione"
- "Progetta una landing page per un'app di produttività con una sezione hero e un elenco funzionalità"
- "Scrivi un modello di brief di progetto che posso riutilizzare per nuove iniziative"

Se Claude non ne crea uno automaticamente, chiedi: "Crea questo come artifact." Nella finestra artifact puoi passare tra anteprima e codice, copiare il contenuto, scaricare i file e vedere il sorgente.

## Condivisione e pubblicazione

- **Copia o scarica** per uso personale o condivisione tramite altri canali.
- **Condividi nella tua organizzazione** (Team/Enterprise) — resta interno, richiede l'autenticazione del team.
- **Pubblica pubblicamente** (Free, Pro, Max) — chiunque abbia il link può visualizzarlo e interagirci, e altri possono "remixarlo" nella propria conversazione. Solo la versione selezionata diventa pubblica; la tua chat resta privata. Puoi annullare la pubblicazione in qualsiasi momento. Gli artifact pubblicati non sono indicizzati dai motori di ricerca.

## Consigli

- **Sii specifico.** "Costruisci un tracker di budget mensile dove inserisco le spese per categoria, vedo una ripartizione a torta e ricevo un avviso quando supero il budget" batte "costruisci un tracker di budget."
- **Descrivi l'utente finale.** "Questo diagramma di flusso è per i nuovi dipendenti" porta a risultati diversi rispetto a "per il team di ingegneria."
- **Itera in modo incrementale.** Aggiungi una funzionalità o fai una modifica alla volta.
- **Richiedi artifact quando serve.** "Per favore crea questo come artifact."
</script>

<script type="text/markdown" data-id="2.3" data-ch="2" data-title="Lavorare con le Skill">
# 2.3 Lavorare con le Skill

## Cosa sono le Skill?

Le Skill sono cartelle di istruzioni, script e risorse che Claude carica dinamicamente per migliorare le prestazioni su compiti specializzati — pacchetti di competenza che insegnano a Claude come completare compiti specifici in modo ripetibile.

Hai già visto le Skill all'opera se hai fatto creare a Claude fogli di calcolo Excel, presentazioni PowerPoint, documenti Word o PDF — quelle capacità di creazione file sono alimentate dalle Skill. Ma le Skill personalizzate vanno oltre, codificando interi flussi di lavoro — un'analisi trimestrale degli scostamenti, una revisione del tono di voce del brand, una checklist di conformità — così Claude segue sempre gli stessi passaggi.

## Due tipi di Skill

- **Skill Anthropic** — create e mantenute da Anthropic (es. creazione documenti per Excel, Word, PowerPoint, PDF). Disponibili per tutti gli utenti a pagamento; Claude le invoca automaticamente quando rilevanti.
- **Skill personalizzate** — quelle che tu o la tua organizzazione create per flussi di lavoro specializzati e compiti specifici del dominio.

## Attivare le Skill

Le Skill sono un'anteprima funzionalità per i piani Pro, Max, Team ed Enterprise. Devi avere **Esecuzione codice e creazione file** attivata, poiché le Skill usano l'ambiente sandbox sicuro di Claude:

1. Impostazioni > Capacità
2. Assicurati che Esecuzione codice e creazione file sia attivata
3. Scorri fino alla sezione Skill e attiva le singole skill

Gli Owner Enterprise devono prima attivare sia Esecuzione codice sia Skill nelle impostazioni Admin. I piani Team le hanno attivate per default.

## Usare le Skill nella pratica

Di solito non devi pensare alle Skill — Claude le seleziona automaticamente in base alla tua richiesta. Prompt che invocano le Skill:

- "Crea un foglio di calcolo Excel che tracci le spese mensili con formule per i totali"
- "Trasforma queste note di riunione in una presentazione PowerPoint"
- "Genera un report PDF che riassuma questi dati"

Quando Claude usa una Skill, la vedrai menzionata nella sua catena di pensiero, e l'output è un file scaricabile. Questa stessa capacità permette a Claude di lavorare con i **tuoi** file (in un ambiente contenuto) per creare versioni aggiornate — in Chat, crea una nuova versione invece di modificare l'originale sul posto.

## Considerazioni di sicurezza

- Installa Skill personalizzate solo da fonti affidabili.
- Le Skill integrate di Anthropic sono testate e mantenute da Anthropic.
- Le Skill personalizzate che carichi sono private al tuo account.
- Rivedi i contenuti di una Skill personalizzata prima dell'uso per capire cosa fa.

## Creare Skill personalizzate

Il modo più semplice è tramite conversazione con Claude — nessun codice richiesto:

1. Di' a Claude cosa vuoi ("Voglio una skill per scrivere revisioni trimestrali del business").
2. Rispondi alle domande di Claude sul tuo flusso di lavoro.
3. Carica materiali di riferimento — modelli, guide di stile, esempi.
4. Salva — Claude genera un file skill strutturato correttamente.
5. Trovala nella scheda Personalizza; modificala manualmente o chattando con Claude.

Da quel momento Claude la invoca automaticamente ogni volta che è rilevante — nessuna attivazione manuale necessaria.

## Skill vs. Progetti

**I Progetti conservano la conoscenza; le Skill eseguono compiti.**

- I **Progetti** sono hub di conoscenza — i materiali di riferimento su cui Claude si basa in ogni conversazione del progetto. Ideali per contesto a lungo termine, materiali di riferimento e collaborazione di team.
- Le **Skill** sono macchine procedurali — i passaggi, l'ordine delle operazioni e la metodologia che Claude dovrebbe seguire ogni volta. Ideali per flussi di lavoro ripetibili e output coerenti.

Si completano a vicenda: una skill per "preparazione chiamata cliente" può attingere ai profili cliente conservati in un progetto. Il progetto fornisce il **cosa** (informazione); la skill fornisce il **come** (processo).
</script>

<script type="text/markdown" data-id="3.1" data-ch="3" data-title="Collegare gli strumenti">
# 3.1 Collegare gli strumenti

## Cosa sono i connettori?

I connettori trasformano Claude da assistente a collaboratore informato, dandogli accesso agli stessi strumenti, dati e contesto che usi ogni giorno. Invece di ricominciare ogni conversazione da zero, Claude lavora direttamente con le tue informazioni reali.

## Punti chiave

- I connettori permettono a Claude di **leggere informazioni ed eseguire azioni** per tuo conto — cercare file, recuperare documenti, analizzare dati, creare contenuti, aggiornare record — tutto dall'interno della conversazione, in base ai permessi che concedi.
- Il **Model Context Protocol (MCP)** alimenta i connettori. Pensa a MCP come all'USB-C per l'IA: uno standard universale così Claude si collega a molte app tramite un'unica interfaccia coerente.
- Due tipi: **connettori web** (servizi cloud come Google Drive, Notion, Slack, Asana) ed **estensioni desktop** (strumenti locali che girano sul tuo computer tramite l'app Claude Desktop).

## Configurare un connettore web

1. **Trovalo:** claude.ai/directory, oppure clicca **+ > Connettori** in qualsiasi chat.
2. **Collega:** seleziona il connettore che vuoi.
3. **Autentica:** verrai reindirizzato al login del servizio — accedi con le tue credenziali esistenti.
4. **Concedi i permessi:** rivedi cosa richiede Claude, poi autorizza l'accesso.
5. **Testa:** torna a Claude e prova "Puoi accedere al mio [nome strumento]?"

## Estensioni desktop

Queste richiedono l'app Claude Desktop invece dell'interfaccia web, e permettono a Claude di interagire con app locali, il tuo file system e funzionalità native su macOS o Windows — accesso ai file locali, controllo del browser, integrazione con app native (come Figma). Installa tramite Impostazioni > Estensioni.

## Usare i connettori nel tuo lavoro

- **Gestione progetti (Asana, Linear, Jira):** "Quali sono i miei compiti a priorità più alta in scadenza questa settimana?"
- **Comunicazione (Slack, Gmail):** "Trova il thread email dove abbiamo discusso il contratto con il fornitore."
- **Documentazione (Notion, Google Drive, Confluence):** "Cerca nella nostra documentazione le linee guida sul tono di voce del brand."
- **Strumenti aziendali (Stripe, PayPal, Salesforce):** "Mostrami le tendenze di ricavo dell'ultimo trimestre."

## Sicurezza e permessi

- **Accesso limitato:** i permessi sono specifici a ciò di cui il connettore ha bisogno; attivali individualmente.
- **Claude vede ciò che vedi tu:** può accedere solo ai dati a cui hai accesso tu — collegare la tua email di lavoro non dà a Claude accesso alla casella di posta del tuo CEO.
- **Revocabile in qualsiasi momento:** disconnetti tramite le impostazioni di Claude o il servizio terzo. Come per le Skill, installa i connettori solo da fonti affidabili.
</script>

<script type="text/markdown" data-id="3.2" data-ch="3" data-title="Modalità Ricerca per approfondimenti">
# 3.2 Modalità Ricerca per approfondimenti

## Fare ricerca con Claude

Ricerca trasforma il modo in cui Claude trova e analizza le informazioni. Invece di una singola ricerca, Claude opera in modo **agentico** — conducendo più ricerche che si costruiscono l'una sull'altra mentre determina esattamente cosa investigare successivamente. Esplora automaticamente angolazioni diverse della tua domanda e affronta sistematicamente le questioni aperte.

## Punti chiave

- **Risposte complete in pochi minuti.** La maggior parte dei report si conclude in 5-15 minuti; le indagini complesse fino a 45 — lavoro che tipicamente richiederebbe ore manualmente.
- Il **pensiero esteso** è attivato automaticamente, così Claude sia pianifica il suo approccio sia raccoglie informazioni in modo approfondito.
- Le **citazioni** rendono facile la verifica — ogni affermazione rimanda alla sua fonte.

## Quando usare Ricerca

Usa Ricerca quando hai bisogno di report completi che sintetizzano più fonti, analisi approfondite sul web e sulle integrazioni collegate, indagini approfondite che richiederebbero ore manualmente, analisi comparative (concorrenti, fornitori), o report con citazioni verificabili.

Considera alternative invece quando:

- **Ricerca web** — ti serve un fatto rapido e specifico da una o due fonti; la velocità conta più della completezza.
- **Pensiero esteso** — ragionamento approfondito su un problema complesso che non richiede informazioni esterne (matematica, debug del codice, logica).
- **Ricerca enterprise** — risposte che attingono dalla conoscenza interna della tua organizzazione (documenti, thread Slack, email, note di riunione).

## Come funziona Ricerca

1. **Claude pianifica il suo approccio.** Il pensiero esteso si attiva; Claude scompone la tua richiesta, individua ciò di cui ha bisogno e pianifica le angolazioni da investigare.
2. **Claude conduce più ricerche** che si costruiscono l'una sull'altra, seguendo piste promettenti e colmando lacune in base a ciò che trova.
3. **Claude sintetizza i risultati** dal web e da qualsiasi integrazione collegata (Gmail, Google Calendar, Google Drive) in un report completo e organizzato.
4. **Claude fornisce citazioni** — ogni affermazione rimanda alla sua fonte.

## Usare Ricerca nella pratica

1. Clicca il pulsante **+** (in basso a sinistra nell'interfaccia chat).
2. Seleziona **Ricerca** dal menu — si evidenzia una volta attiva.
3. Inserisci il tuo prompt e invia; Claude lavora in background con indicatori di avanzamento.

> Importante: la ricerca web deve essere attivata perché Ricerca funzioni.

## Consigli per prompt di Ricerca efficaci

- **Sii specifico sugli obiettivi.** "Analizza il mercato delle batterie EV — attori chiave, tendenze tecnologiche e sfide della catena di approvvigionamento che influenzano le decisioni di investimento" batte "parlami del mercato EV."
- **Specifica la struttura che vuoi.** Elenca le sezioni; Claude organizza i risultati attorno ad esse.
- **Includi i vincoli rilevanti.** Fasce di budget, tempistiche, requisiti geografici.
- **Chiedi a Claude di affinare il tuo prompt** prima di attivare la funzionalità, se non sei sicuro di come formulare la domanda.

> Consiglio: disattiva la ricerca web per fare ricerca solo interna sui tuoi strumenti collegati — ottimo per "Cosa ha discusso il nostro team sul lancio Q3 su Slack e Docs?"
</script>

<script type="text/markdown" data-id="4.1" data-ch="4" data-title="Claude in azione: casi d'uso per ruolo">
# 4.1 Claude in azione: casi d'uso per ruolo

Qualunque cosa tu faccia, Claude può aiutarti a semplificare il tuo lavoro. Questa lezione evidenzia casi d'uso pratici organizzati per ruolo. Ognuno rimanda a una guida dettagliata nella Galleria Casi d'Uso con istruzioni passo dopo passo.

## Uso professionale generale

- **Genera report di stato progetto** — mantieni gli stakeholder informati con aggiornamenti chiari e coerenti.
- **Analizza schemi nel feedback degli utenti** — estrai insight da commenti e sondaggi dei clienti.
- **Racchiudi le linee guida del tuo brand in una skill** — crea una Skill riutilizzabile che applica i tuoi standard di brand.

## Vendite

- **Costruisci una libreria di battle card** — intelligence competitiva che aiuta il tuo team a vincere le trattative.
- **Preparati per le trattative di vendita** — fai ricerca sui prospect e organizza i punti di discussione.
- **Crea report di vendita** — trasforma i dati della pipeline in report chiari e attuabili.

## Marketing

- **Analizza le prestazioni delle campagne** — estrai insight dalle metriche delle campagne.
- **Adatta i contenuti tra piattaforme** — riadatta i contenuti per canali e pubblici diversi.

## Finanza

- **Costruisci modelli finanziari** — crea e affina proiezioni.
- **Scrivi memo di investimento** — struttura e scrivi analisi in modo efficiente.
- **Comprendi ed estendi un foglio di calcolo ereditato** — decifra fogli di calcolo complessi e aggiungi funzionalità.

## HR

- **Crea guide di onboarding per i nuovi assunti** — materiali completi calibrati per ruoli diversi.

## Legale

- **Traccia le tempistiche di discovery e analizza gli schemi** — organizza le tempistiche dei casi e individua schemi chiave.

## Ricerca

- **Pianifica la tua revisione della letteratura** — organizza il tuo approccio alle fonti accademiche.
- **Verifica statistiche da dati grezzi** — ricontrolla calcoli e analisi.

## Scopri di più

Questi esempi sono solo l'inizio. Visita la Galleria Casi d'Uso per sfogliare l'intera collezione e trovare ispirazione per il tuo lavoro specifico.
</script>

<script type="text/markdown" data-id="4.2" data-ch="4" data-title="Altri modi di lavorare con Claude">
# 4.2 Altri modi di lavorare con Claude

Claude è un'intelligenza. Claude.ai è solo un modo di lavorare con essa. Claude è disponibile anche in diversi strumenti specializzati progettati per incontrarti dove già lavori.

## Claude Code

Uno strumento di programmazione agentico che funziona nel tuo terminale, IDE, browser o Slack. Comprende il tuo codebase, esegue comandi e gestisce interi flussi di lavoro di sviluppo tramite linguaggio naturale. Usalo per costruire funzionalità da descrizioni in linguaggio semplice, fare debug da messaggi di errore incollati, navigare codebase sconosciuti, o automatizzare compiti noiosi come correzioni di lint, conflitti di merge e note di rilascio.

## @Claude

Porta Claude in Slack — ottieni aiuto nei canali e nei thread, o porta il contesto di Slack nelle tue conversazioni menzionando @Claude. Scrivi bozze di risposte, riassumi thread lunghi, preparati per riunioni, inserisciti in un nuovo team rivedendo la cronologia del canale, o passa un compito di programmazione direttamente da una segnalazione di bug.

## Claude Design

Uno spazio dedicato per trasformare idee in interfacce funzionanti. Descrivi cosa vuoi — o parti da una bozza o uno screenshot — e Claude costruisce un prototipo interattivo che puoi affinare tramite conversazione e passare al tuo team, usando il tuo design system così ciò che consegni corrisponde a ciò che l'ingegneria costruirà.

## Claude per Microsoft 365

Claude come barra laterale dentro i documenti che hai già aperti:

- **Excel** — comprendi le formule tra fogli, aggiorna le ipotesi preservando le dipendenze, fai debug degli errori (#REF!, #VALUE!, riferimenti circolari), e costruisci tabelle pivot e grafici.
- **PowerPoint** — trasforma una scaletta in una prima bozza di presentazione, rendi più incisivo il testo e aggiungi note per il relatore, ristruttura le sezioni, e applica una formattazione coerente.
- **Word** — scrivi bozze da una scaletta nel tuo modello, rivedi sezioni, lavora tra modifiche tracciate e commenti, e ancora le affermazioni a fonti collegate.
- **Outlook** — smista la posta, scrivi bozze di risposte con il contesto di thread e calendario, e riassumi catene lunghe. (Attualmente in beta, installato separatamente.)

## Claude in Chrome

Un'estensione del browser che aggiunge Claude come barra laterale in Chrome; può osservare cosa stai facendo e compiere azioni nel tuo browser: riassumere articoli e pagine, scrivere bozze di risposte email, compilare moduli ripetitivi, testare flussi di siti web e mantenere il contesto tra le schede — ottimo per estrarre contesto da strumenti interni di nicchia, CRM o dashboard.

> Nota: Claude in Chrome è in beta pubblica — consigliato per compiti a basso rischio su siti affidabili. Chiede il permesso prima di azioni ad alto rischio come acquisti, e alcune categorie di siti (servizi finanziari, contenuti per adulti) sono bloccate per default.

## Riepilogo — dove gira ogni strumento

- **Claude.ai** — compiti generali, ricerca, scrittura, analisi, creazione file. App web, desktop e mobile.
- **Claude Code** — sviluppo software, navigazione codebase, flussi di lavoro git. Terminale, IDE o browser.
- **Claude Cowork** — compiti complessi e multi-fase: brief di ricerca, creazione documenti, organizzazione file, analisi dati. Desktop (e mobile tramite Dispatch).
- **@Claude** — collaborazione di team, preparazione riunioni, risposte rapide nel contesto. Spazio di lavoro Slack.
- **Claude Design** — prototipi UI, esplorazione di design, mockup consapevoli del design system. Web.
- **Claude per Microsoft 365** — modifica sul posto e contesto portato tra documenti. Barre laterali di Excel, PowerPoint, Word, Outlook.
- **Claude in Chrome** — ricerca web, gestione email, automazione del browser. Barra laterale del browser Chrome.
</script>

<script>
(function(){
  "use strict";
  var CHAP = {
    "1":"Capitolo 1 · Iniziare",
    "2":"Capitolo 2 · Progetti, artifact, skill",
    "3":"Capitolo 3 · Estendere Claude",
    "4":"Capitolo 4 · Metterlo al lavoro"
  };

  // ---- collect lessons from embedded markdown blocks ----
  var blocks = Array.prototype.slice.call(document.querySelectorAll('script[type="text/markdown"]'));
  var lessons = blocks.map(function(b){
    return { id:b.getAttribute('data-id'), ch:b.getAttribute('data-ch'),
             title:b.getAttribute('data-title'), md:b.textContent };
  });
  var byId = {}; lessons.forEach(function(l){ byId[l.id]=l; });

  // ---- minimal markdown renderer ----
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)[^)]*\)/g,'<img alt="$1" src="$2" loading="lazy">');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)[^)]*\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>');
    return s;
  }
  function render(src){
    var lines = String(src).replace(/\r\n/g,'\n').split('\n');
    var out=[], i=0;
    while(i<lines.length && lines[i].trim()==='') i++;
    if(i<lines.length && /^#\s+/.test(lines[i])) i++;   // drop leading H1 (shown as page title)
    while(i<lines.length){
      var line=lines[i];
      if(line.trim()===''){ i++; continue; }
      var fence=line.match(/^(\s*)```(.*)$/);
      if(fence){
        var pad=fence[1].length; i++; var code=[];
        while(i<lines.length && !/^\s*```/.test(lines[i])){ code.push(lines[i].slice(pad)); i++; }
        i++;
        out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');
        continue;
      }
      var h=line.match(/^(#{1,6})\s+(.*)$/);
      if(h){ var lv=h[1].length; out.push('<h'+lv+'>'+inline(esc(h[2]))+'</h'+lv+'>'); i++; continue; }
      if(/^>\s?/.test(line)){
        var bq=[];
        while(i<lines.length && /^>\s?/.test(lines[i])){ bq.push(lines[i].replace(/^>\s?/,'')); i++; }
        out.push('<blockquote>'+render(bq.join('\n'))+'</blockquote>');
        continue;
      }
      if(/^\s*[-*]\s+/.test(line)){
        var ui=[];
        while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ ui.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; }
        out.push('<ul>'+ui.map(function(t){return '<li>'+inline(esc(t))+'</li>';}).join('')+'</ul>');
        continue;
      }
      if(/^\s*\d+\.\s+/.test(line)){
        var oi=[];
        while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ oi.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
        out.push('<ol>'+oi.map(function(t){return '<li>'+inline(esc(t))+'</li>';}).join('')+'</ol>');
        continue;
      }
      var para=[line]; i++;
      while(i<lines.length && lines[i].trim()!=='' &&
            !/^(\s*#{1,6}\s|>|\s*[-*]\s|\s*\d+\.\s|\s*```)/.test(lines[i])){ para.push(lines[i]); i++; }
      out.push('<p>'+inline(esc(para.join(' ')))+'</p>');
    }
    var html=out.join('\n');
    if(html.replace(/\s/g,'')==='') html='<p class="empty">Questa lezione del corso non ha note di testo. Guarda il video o consulta la documentazione ufficiale.</p>';
    return html;
  }

  // ---- build sidebar ----
  var side=document.getElementById('side');
  var order=[], curCh=null, grp=null;
  lessons.forEach(function(l){
    if(l.ch!==curCh){
      curCh=l.ch;
      grp=document.createElement('div'); grp.className='grp';
      var h=document.createElement('h3'); h.textContent=CHAP[l.ch]||('Capitolo '+l.ch); grp.appendChild(h);
      side.appendChild(grp);
    }
    var a=document.createElement('a'); a.href='#'+l.id; a.dataset.id=l.id;
    a.innerHTML='<span class="n">'+l.id+'</span><span class="t">'+l.title.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</span>';
    grp.appendChild(a);
    order.push(l.id);
  });

  var crumbEl=document.getElementById('crumb'),
      titleEl=document.getElementById('title'),
      contentEl=document.getElementById('content'),
      pagerEl=document.getElementById('pager');

  function show(id){
    var l=byId[id]||byId[order[0]];
    crumbEl.textContent=CHAP[l.ch]||('Capitolo '+l.ch);
    titleEl.textContent=l.id+' · '+l.title;
    contentEl.innerHTML=render(l.md);
    document.title='Claude 101 — '+l.title;
    Array.prototype.forEach.call(side.querySelectorAll('a'),function(a){
      a.classList.toggle('active', a.dataset.id===l.id);
    });
    var active=side.querySelector('a.active');
    if(active && active.scrollIntoView) active.scrollIntoView({block:'nearest'});
    // pager
    var idx=order.indexOf(l.id);
    pagerEl.innerHTML='';
    if(idx>0){ var p=byId[order[idx-1]];
      pagerEl.insertAdjacentHTML('beforeend','<a class="prev" href="#'+p.id+'"><span class="dir">← precedente</span><span class="ttl">'+p.id+' '+p.title+'</span></a>');
    } else { pagerEl.insertAdjacentHTML('beforeend','<span class="spacer"></span>'); }
    if(idx<order.length-1){ var n=byId[order[idx+1]];
      pagerEl.insertAdjacentHTML('beforeend','<a class="next" href="#'+n.id+'"><span class="dir">successiva →</span><span class="ttl">'+n.id+' '+n.title+'</span></a>');
    } else { pagerEl.insertAdjacentHTML('beforeend','<span class="spacer"></span>'); }
    document.body.classList.remove('navopen');
    document.getElementById('side').classList.remove('open');
    window.scrollTo(0,0);
  }

  function current(){ return (location.hash||'').replace(/^#/,''); }
  window.addEventListener('hashchange', function(){ show(current()); });
  show(current());

  // ---- theme toggle ----
  var root=document.documentElement;
  root.setAttribute('data-theme',matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.getElementById('themebtn').addEventListener('click',function(){
    var dark=matchMedia('(prefers-color-scheme:dark)').matches;
    var cur=root.getAttribute('data-theme')||(dark?'dark':'light');
    root.setAttribute('data-theme', cur==='dark'?'light':'dark');
  });
  // ---- mobile nav ----
  document.getElementById('menubtn').addEventListener('click',function(){
    var s=document.getElementById('side');
    s.classList.toggle('open');
    document.body.classList.toggle('navopen', s.classList.contains('open'));
  });
})();
</script>
</body>
