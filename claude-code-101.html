<script type="text/markdown" data-id="1.1" data-ch="1" data-title="Cos'è Claude Code?">
# 1.1 Cos'è Claude Code?

[Video](https://www.youtube.com/watch?v=fl1DSmwQKKY)

Claude Code è uno strumento di programmazione agentico che comprende il tuo codebase, modifica i tuoi file, esegue comandi e si integra con i tuoi strumenti di sviluppo esistenti per aiutarti a portare a termine il lavoro più velocemente. È disponibile nel tuo terminale, in Visual Studio Code, nell'app Claude Desktop, sul web e negli IDE JetBrains.

## Cosa distingue Claude Code da Claude?

Se hai già usato Claude.ai, potresti chiederti cosa rende diverso Claude Code. A differenza di Claude.ai, Claude Code ha accesso diretto ai tuoi file, al tuo terminale e all'intero codebase. Invece di copiare e incollare codice avanti e indietro, entra e fa il lavoro da solo.

La differenza chiave è che Claude Code funziona come un Agente IA.

## Cos'è un Agente?

Un Agente IA è un software che può interagire con il proprio ambiente ed eseguire azioni per raggiungere un obiettivo definito. Alla base, funziona facendo operare un modello linguistico di grandi dimensioni in un loop in tempo reale. Gli Agenti IA possono avere accesso a strumenti, servizi esterni, o persino ad altri Agenti IA per aiutarli a raggiungere i loro obiettivi.

## Cosa può fare davvero Claude Code?

Ecco come si presenta nella pratica:

- **Legge e comprende il tuo codebase.** Puoi chiedere a Claude Code di spiegare una funzionalità o rintracciare un bug in tutto il codice.
- **Modifica file in tutto il progetto.** Claude Code può refactorare una funzione e aggiornare ogni file che la referenzia.
- **Esegue comandi da terminale.** Può eseguire il tuo script di build, far girare i tuoi test, installare pacchetti e usare l'output per decidere cosa fare dopo.
- **Cerca sul web.** Se ha bisogno di documentazione o dei riferimenti API più recenti, può cercarli per te.

## Usare Claude Code in modo efficace

Per usare Claude Code in modo efficace, tieni a mente questi tre concetti:

- **La finestra di contesto.** Pensala come la memoria di lavoro di Claude. Può contenere molto, ma non tutto in una volta. È qui che entra in gioco l'aspetto "agentico" — Claude trova modi strategici per individuare risposte nel tuo codebase senza caricare tutto nel contesto.
- **Chiede il permesso.** Per default, Claude Code ti chiederà prima di eseguire comandi o fare modifiche. Hai sempre il controllo, sia che tu preferisca un approccio pratico o meno.
- **Può commettere errori.** Come ogni strumento, Claude Code non è perfetto. Potrebbe fraintendere le tue intenzioni, introdurre un bug, o ingegnerizzare eccessivamente una soluzione. Rimanere coinvolto ti aiuta a individuare questi problemi in anticipo.

## Riepilogo

Claude Code è uno strumento di programmazione agentico. Legge il tuo codebase, modifica i tuoi file, esegue comandi e si collega a strumenti esterni per aiutarti a rilasciare più velocemente. Puoi usarlo oggi stesso nel tuo terminale, in VS Code, JetBrains e l'app Claude Desktop.
</script>

<script type="text/markdown" data-id="1.2" data-ch="1" data-title="Come funziona Claude Code">
# 1.2 Come funziona Claude Code

[Video](https://www.youtube.com/watch?v=6bs5b4FltCU)

Claude Code è diverso dalle tipiche applicazioni di chat. Capire come funziona sotto il cofano ti aiuterà a usarlo in modo più efficace.

## Il loop agentico

![Diagramma del loop agentico](https://everpath-course-content.s3-accelerate.amazonaws.com/instructor%2F8lsy243ftffjjy1cx9lm3o2bw%2Fpublic%2F1775686365%2Fagenticloop.1775686365141.jpg)

Claude Code si spiega meglio attraverso il loop agentico:

1. Inserisci un prompt in Claude Code.
2. Claude raccoglie il contesto di cui ha bisogno interagendo con il modello, che restituisce testo o una chiamata a uno strumento che Claude Code può eseguire.
3. Compie un'azione — per esempio, modificando un file o eseguendo un comando.
4. Verifica i risultati e determina se raggiungono ciò che il tuo prompt si proponeva di fare.
5. Se sì, Claude termina e attende il prossimo prompt. Se no, torna indietro nel loop e riprova finché i risultati non sono completi e verificabili.

Durante tutto questo loop, puoi aggiungere contesto, interrompere o guidare il modello per aiutarlo a orientarsi verso il tuo obiettivo.

> Diagramma del loop agentico: il tuo prompt confluisce nel loop di Raccogliere contesto, Compiere un'azione e Verificare i risultati, con la possibilità di interrompere, guidare o aggiungere contesto in qualsiasi momento.

## Contesto

Claude ha una finestra di contesto che determina quanta parte della tua conversazione, dei contenuti dei file, degli output dei comandi e altro può memorizzare e referenziare. Una volta raggiunto quel limite, Claude Code comprime la conversazione — determinando automaticamente cosa può rimuovere o riassumere per riportare la finestra di contesto a una dimensione utilizzabile.

## Strumenti

Gli strumenti sono la spina dorsale del funzionamento degli agenti. La maggior parte degli assistenti IA si limita a prendere testo in input e restituire testo in output. Gli strumenti permettono a Claude Code di determinare quando eseguire codice per avvicinarsi al completamento di un compito. Potrebbe essere uno strumento di lettura file, uno strumento di ricerca web, o qualsiasi altro numero di capacità. Claude Code usa la comprensione semantica per determinare quando chiamare uno strumento e come usarne l'output.

## Permessi

Claude Code ha diverse modalità di permesso:

- **Comportamento predefinito:** Claude chiede il permesso esplicito prima di modificare un file o eseguire un comando shell.
- **Accettazione automatica:** i file vengono modificati senza chiedere, ma i comandi richiedono ancora l'approvazione.
- **Modalità Piano:** usa strumenti di sola lettura per compilare un piano d'azione prima di iniziare qualsiasi lavoro.

> Claude Code che chiede il permesso prima di eseguire un comando bash.

![Esempio di richiesta di permesso](https://everpath-course-content.s3-accelerate.amazonaws.com/instructor%2F8lsy243ftffjjy1cx9lm3o2bw%2Fpublic%2F1775686376%2Fvideo2ask.1775686376586.jpg)

Tutto questo può essere configurato nel tuo file di impostazioni. Fai attenzione quando salti i permessi — dare a Claude Code mano libera per eseguire comandi significa che un errore potrebbe essere più difficile da individuare prima che accada.

## Riepilogo

Claude Code combina diversi concetti agentici: un loop agentico, una finestra di contesto gestita, strumenti e permessi configurabili — tutto dentro il tuo terminale. Può leggere il tuo codebase, compiere azioni e verificare il proprio lavoro. Questo è ciò che lo rende fondamentalmente diverso da una finestra di chat.
</script>

<script type="text/markdown" data-id="2.2" data-ch="2" data-title="Il tuo primo prompt">
# 2.2 Il tuo primo prompt

[Video](https://www.youtube.com/watch?v=gbetp6D7J_Q)

Parli con Claude Code come faresti con qualsiasi assistente IA. Quando inserisci il tuo prompt, ecco alcune cose da considerare che possono sia proteggerti sia semplificarti la vita.

## Accettazione automatica vs. approvazione

Puoi scegliere se Claude accetta automaticamente ogni modifica ai file che propone, oppure se chiede il tuo permesso esplicito ogni volta. Premi `Shift + Tab` per alternare tra le modalità.

- **Modalità approvazione:** Claude chiede il permesso ogni volta che vuole modificare un file o eseguire un comando.
- **Modalità accettazione automatica:** le modifiche ai file vengono approvate automaticamente, ma i comandi richiedono ancora il tuo permesso.

Non c'è una risposta giusta o sbagliata — dipende da cosa ti trovi più a tuo agio.

> Claude Code in modalità accettazione automatica, mentre legge file e lavora su un compito.

## Modalità Piano

All'interno del menu `Shift + Tab` c'è la Modalità Piano. La modalità piano prende il tuo prompt e usa strumenti di sola lettura per analizzare il tuo codebase e studiare l'implementazione che proponi. Farà domande di chiarimento lungo il percorso, poi restituirà un piano dettagliato che può eseguire.

La modalità piano è ottima per pianificare modifiche complesse o fare una revisione del codice sicura. Molte volte chiederai a Claude di gestire implementazioni multi-fase verso una funzionalità, ed è esattamente qui che la Modalità Piano eccelle.

> Claude Code con la modalità piano attiva, che mostra l'indicatore nella barra di stato.

## Esempio: aggiungere un toggle per la modalità scura

Vediamo un esempio. Supponi di avere un'applicazione che ha bisogno di un toggle per la modalità scura. Apri la directory radice del tuo progetto ed esegui `claude`. Premi `Shift + Tab` un paio di volte per entrare in Modalità Piano, poi scrivi un prompt come:

> La mia app ha bisogno della modalità scura implementata in tutta l'app. Puoi creare un interruttore a levetta nell'intestazione che permetta a un utente di passare tra modalità chiara e modalità scura? Ho bisogno che tu trovi un buon colore di contrasto che funzioni in base al mio tema chiaro esistente.

> Inserimento del prompt per la modalità scura in Claude Code con la modalità piano attiva.

Lascia che Claude pianifichi il tutto. Dopo aver rivisto il piano, se ti sembra buono, accettalo e lascia che Claude ti chieda l'approvazione a ogni passaggio. Alla fine, puoi vedere esattamente cosa ha fatto Claude e come è arrivato alle sue conclusioni.

## Riepilogo

Quando usi Claude Code, cerca di essere il più descrittivo possibile nel tuo prompt. Se vuoi rimanere coinvolto a ogni passaggio, puoi farlo. Usa la Modalità Piano per lasciare che Claude approfondisca i dettagli di ciò che vuoi ottenere prima di eseguire qualsiasi codice.
</script>

<script type="text/markdown" data-id="3.1" data-ch="3" data-title="Esplora → Pianifica → Programma → Commit">
# 3.1 Il flusso di lavoro Esplora → Pianifica → Programma → Commit

[Video](https://www.youtube.com/watch?v=xJQuF02NAK8)

Se c'è una cosa sola da portare a casa da questo corso, che sia questa: Esplora, Pianifica, Programma e fai il Commit. Senza di essa, la maggior parte delle persone salta dritta a chiedere a Claude di scrivere codice — il che significa più correzioni di rotta in seguito.

## Esplora e Pianifica

Il modo più veloce per gestire questi primi due passaggi è con la Modalità Piano. In modalità piano, Claude non può modificare i file — si limita a leggerli per raccogliere informazioni su come affronterà l'implementazione.

Per entrare in modalità piano, premi `Shift + Tab` finché non vedi "Modalità Piano" sotto il campo di testo. Poi scrivi un prompt come:

> Devo aggiungere la conversione WebP alla nostra pipeline di caricamento immagini. Individua dove nella pipeline dovrebbe avvenire, se servono nuove dipendenze, e come affrontarla.

> Barra di stato di Claude Code che mostra la modalità piano attiva con shift+tab per alternare.

Claude leggerà i file rilevanti, farà alcune ricerche web e ti darà un piano d'azione. Rivedilo e decidi se soddisfa i tuoi criteri. Se no, chiedigli di rivedere aree specifiche.

> Claude Code che presenta il piano con opzioni per approvare, rivedere aree, o fare domande.

Questo è il posto migliore per correggere la rotta perché è prima che venga scritto qualsiasi codice. Puoi anche eseguire il subagent di esplorazione senza essere in modalità piano se vuoi solo un riepilogo generale del tuo codebase senza l'intenzione di fare modifiche in seguito.

## Programma

Una volta che il piano sembra buono, seleziona "approva" per accettarlo e lascia che Claude lavori sugli elementi dell'elenco. Puoi scegliere se Claude accetta automaticamente le modifiche ai file o te le chiede ogni volta.

Claude farà del suo meglio per risolvere i problemi prima di considerare il piano "finito," ma a volte dovrai intervenire. Questo è il vantaggio di lavorare con la Modalità Piano — dopo l'esecuzione, hai anche il contesto di come sei arrivato ai risultati, il che aiuta a guidare le prossime decisioni di Claude.

Alcuni consigli per rendere più fluida la fase di programmazione:

- **Definisci un criterio di successo.** Perché Claude sia sicuro dei suoi risultati, deve essere chiaro su cosa significhi "corretto." Rendilo esplicito quando scrivi il tuo piano.
- **Aggiungi strumenti.** Gli strumenti che aiutano Claude a raggiungere i suoi obiettivi eliminano un sacco di andirivieni. Per esempio, se stai costruendo UI web, installa l'estensione Claude in Chrome così Claude Code può controllare una scheda del browser e testare direttamente l'interfaccia.

> La pagina dell'estensione Claude in Chrome nel Chrome Web Store.

- **Includi una suite di test.** Dai a Claude una suite di test contro cui possa validare continuamente. Claude può persino scrivere i test per te. Prima di affidargliela, assicurati che i test siano una fonte di verità affidabile per evitare falsi positivi.

> Consiglio rapido: se noti che Claude continua a imbattersi negli stessi problemi, chiedigli di salvare la soluzione nel suo file CLAUDE.md.

## Commit

Una volta che hai testato tu stesso le modifiche e sei soddisfatto dei risultati, è il momento di fare il push del codice. Prima di fare il commit, esegui un subagent di revisione del codice per esaminare il tuo lavoro. Un subagent porta uno sguardo nuovo sul codebase — non porta il pregiudizio che l'agente principale potrebbe avere dalla sessione.

> Un subagent code-reviewer in esecuzione in Claude Code, mentre legge file e revisiona le modifiche recenti.

Poi fai generare a Claude un messaggio di commit nel tuo stile. Ripeti il processo.

## Riepilogo

Per essere efficace con Claude Code, segui il flusso di lavoro Esplora, Pianifica, Programma e Commit:

- **Esplora** dà a Claude il contesto rilevante di cui ha bisogno per il tuo progetto.
- **Pianifica** crea un piano d'azione che Claude usa per misurare il successo.
- **Programma** è l'andirivieni tra te e Claude prima di stabilire il risultato finale.
- **Commit** ti aiuta a rivedere e a fare il push del codice così puoi iniziare la tua prossima funzionalità.
</script>

<script type="text/markdown" data-id="3.2" data-ch="3" data-title="Gestione del contesto">
# 3.2 Gestione del contesto

[Video](https://www.youtube.com/watch?v=eW3oTyfeWZ0)

Il contesto è la memoria di lavoro di Claude. Ogni file che legge, ogni comando che esegue, ogni messaggio che invii — tutto occupa spazio nella finestra di contesto.

## Cos'è la finestra di contesto?

Pensa alla finestra di contesto come alla quantità di spazio che Claude può tenere in memoria. Ogni volta che inserisci un prompt, Claude legge un file, esegue una chiamata a uno strumento, o riceve il risultato di una chiamata a uno strumento, tutto si aggiunge alla finestra di contesto. Poiché c'è una quantità finita di spazio, diventa importante ottimizzare come lo usi.

> Diagramma che mostra la finestra di contesto come una griglia di token — alcuni occupati, la maggior parte disponibili.

## Cosa succede quando il contesto si riempie

Quando ti avvicini al limite, la finestra di contesto viene compressa automaticamente. La compressione riassume i dettagli importanti e rimuove i risultati non necessari delle chiamate agli strumenti per liberare spazio. Nota che questo processo può potenzialmente far perdere dei dettagli.

> Claude Code che mostra "Compressione della conversazione..." mentre riassume il contesto. Claude Code che mostra un riepilogo compresso della conversazione precedente inclusi i concetti tecnici chiave e i file.

## Comandi

Puoi eseguire la compressione manualmente con il comando `/compact`. Questo comprime tutto fino a quel punto. È utile quando vuoi liberare spazio di contesto mantenendo memoria di ciò su cui hai lavorato in precedenza.

> Il comando `/compact` nel menu di autocompletamento di Claude Code.

Se vuoi ripartire completamente da zero senza memoria della sessione precedente, esegui `/clear`. Questo rimuove tutto.

> Esecuzione di `/clear` in Claude Code per iniziare una sessione nuova.

Per controllare lo stato del tuo contesto, esegui il comando `/context`. Otterrai una panoramica di alto livello della dimensione del tuo contesto, le categorie che occupano più spazio, e una rappresentazione visiva della ripartizione.

> Output del comando `/context` che mostra la ripartizione dell'uso del contesto con un grafico a barre visivo.

## Quando usare quale

Una regola generale:

- **Usa `/compact`** quando stai lavorando su una funzionalità specifica e ti stai avvicinando al limite di contesto ma devi continuare. Mantenere il contesto rilevante per la tua funzionalità attuale è importante.
- **Usa `/clear`** quando vuoi iniziare una nuova funzionalità. Non vuoi che la conversazione precedente introduca pregiudizi in qualcosa di nuovo. Per le cose che vuoi che Claude ricordi tra le sessioni, mettile nel tuo file CLAUDE.md così non deve riscoprirle da zero.

> Un file CLAUDE.md con sezioni di comandi, note importanti e architettura.

## Consigli per risparmiare spazio di contesto

- **Sii specifico.** Un prompt vago potrebbe sembrare più piccolo, ma in realtà costa più contesto a lungo termine. Senza istruzioni chiare, Claude è costretto a esplorare di più il tuo codebase e a fare il proprio ragionamento — il che occupa molto più spazio di contesto rispetto a un prompt dettagliato.
- **Gestisci i tuoi server MCP.** I server MCP caricano tutti i loro strumenti disponibili nel contesto per default, anche quando non li stai usando. Se hai server configurati per cose non correlate al progetto attuale, considera di disattivarli. Puoi anche provare le "Skill," che funzionano in modo simile ai server MCP ma non caricano tutto in anticipo nel contesto.
- **Usa i subagent.** I subagent girano in parallelo con il tuo agente principale ma hanno una finestra di contesto completamente separata. Per compiti dove ti serve solo la risposta — come "dove si trovano gli endpoint di autenticazione?" — un subagent fa il lavoro e restituisce solo un riepilogo al tuo agente principale, mantenendo pulito il tuo contesto principale.

## Riepilogo

Gestire il contesto in Claude Code è cruciale. Usa `/compact` per riassumere sessioni lunghe e `/clear` per ripartire da zero. Per usare la tua finestra di contesto in modo efficace: sii specifico con i tuoi prompt, controlla cosa sta consumando il tuo contesto attuale, e usa i subagent per delegare compiti dove ti serve solo il risultato.
</script>

<script type="text/markdown" data-id="3.3" data-ch="3" data-title="Revisione del codice">
# 3.3 Revisione del codice

[Video](https://www.youtube.com/watch?v=RKsADl0ZC3Y)

Claude Code ha alcune funzionalità integrate che velocizzano il tuo flusso di lavoro git. Vediamole insieme.

## Revisione con un subagent

Prima di fare il push di una PR, chiedi a Claude di usare un subagent per revisionare le tue modifiche. Il subagent gira nella propria finestra di contesto con occhi nuovi — non porta il pregiudizio dell'agente principale che ha appena passato la sessione a scrivere il codice.

Quando crei un subagent code-reviewer, limitalo a strumenti di sola lettura. Un revisore dovrebbe segnalare problemi, non modificare file. Includi la configurazione del subagent nel tuo repository così tutto il team usa lo stesso revisore.

## La Skill `/commit-push-pr`

La skill `/commit-push-pr` gestisce commit, push e creazione della PR tutto in un unico passaggio. Invece di farlo manualmente ogni volta, esegui semplicemente la skill e Claude se ne occupa.

Se hai un server MCP Slack configurato con i canali elencati nel tuo CLAUDE.md, pubblicherà automaticamente il link della PR nel canale del tuo team.

## Collegamento della sessione con `--from-pr`

Quando Claude crea una PR tramite `gh pr create`, la sessione viene collegata automaticamente a quella PR. Se devi tornarci più avanti — magari per rispondere ai commenti di revisione o correggere una build che fallisce — esegui:

```
claude --from-pr <NUMERO_PR>
```

Questo riprende esattamente da dove avevi lasciato.

## Riepilogo

Usa un subagent per una revisione del codice imparziale prima di fare il push. Usa `/commit-push-pr` per gestire l'intero flusso da commit a PR in un unico passaggio. E usa `--from-pr` per riprendere il lavoro su una PR più avanti. Sono funzionalità piccole, ma eliminano molto attrito dal tuo flusso di lavoro quotidiano.
</script>

<script type="text/markdown" data-id="4.1" data-ch="4" data-title="Il file CLAUDE.md">
# 4.1 Il file CLAUDE.md

[Video](https://www.youtube.com/watch?v=O0FGCxkHM-U)

Una delle funzionalità più utili in Claude Code è il file CLAUDE.md. Dà a Claude Code memoria persistente sul tuo progetto.

## Il problema che risolve

Quando apri Claude Code senza un file CLAUDE.md, riparte da zero ogni volta. Deve riesplorare il tuo codebase, capire quali dipendenze servono, e capire quali funzionalità sono già implementate. A volte fa supposizioni, il che rende più difficile guidare Claude nella direzione giusta.

CLAUDE.md risolve questo problema. È un file Markdown che aggiungi alla radice del tuo progetto, e Claude Code lo legge automaticamente ogni volta che avvii una sessione. Pensalo come uno script di onboarding per il tuo codebase. Il contenuto del file CLAUDE.md viene aggiunto al tuo prompt.

## Un esempio

Ecco come appare un tipico file CLAUDE.md:

```markdown
# Progetto

Questa è un'app Next.js 15 che usa l'App Router, Tailwind e Drizzle ORM.

# Comandi
- Server di sviluppo: `pnpm dev`
- Esegui i test: `pnpm test`
- Lint: `pnpm lint`

# Stile del codice
- Usa indentazione a 2 spazi
- Preferisci gli export nominati
- Tutte le route API vanno in app/api/
- Usa le server action invece delle route API dove possibile
```

È semplice. Ora se chiedi a Claude Code di creare un componente React, sa già di usare Tailwind per lo stile e di seguire le tue convenzioni di codice.

> Un file CLAUDE.md aperto in VS Code che mostra informazioni sul progetto, comandi e regole di stile del codice.

## CLAUDE.md è per i team

Puoi (e dovresti) fare il commit del tuo CLAUDE.md nel controllo versione così tutto il team ne beneficia. C'è in realtà una gerarchia di file di memoria a seconda di a chi sono destinati:

- Il **CLAUDE.md a livello di progetto** vive nella directory radice del tuo progetto. Condiviso con il team.
- Il **CLAUDE.md a livello utente** vive nella tua cartella di configurazione. Questo è solo per te e si applica a tutti i tuoi progetti. Metti qui le tue preferenze personali.

## Consigli

- **Salva le correzioni in memoria.** Se ti ritrovi a correggere Claude ripetutamente — come dirgli di usare sempre le server action invece delle route API — chiedi esplicitamente a Claude di salvare quella regola in memoria. La prossima volta che apri il progetto, la saprà.

> Chiedere a Claude di salvare una regola nel file CLAUDE.md — usa sempre le server action invece delle route API.

- **Fai riferimento alla documentazione del progetto.** Se hai documentazione nel tuo progetto a cui vuoi che Claude faccia riferimento, usa il simbolo `@` con il percorso del file:

```markdown
## README.md

Leggi qui per maggiori informazioni: @README.md
```

- **Inizia senza uno.** Ti consigliamo di iniziare un progetto senza un file CLAUDE.md così puoi vedere dove devi costantemente correggere la rotta al modello. Questo mantiene il tuo CLAUDE.md compatto e focalizzato solo sulle informazioni necessarie. Quando sei pronto, esegui `/init` per far generare a Claude uno per te.

## Riepilogo

La differenza tra una sessione frustrante con Claude Code e una produttiva spesso dipende dal contesto — e il file CLAUDE.md è come fornisci quel contesto. Inizia con il tuo stack, le tue preferenze e i tuoi comandi, poi costruisci da lì mano a mano che procedi.
</script>

<script type="text/markdown" data-id="4.2" data-ch="4" data-title="Subagent">
# 4.2 Subagent

[Video](https://www.youtube.com/watch?v=jKErNxuxPXg)

Claude può delegare compiti a subagent che li scompongono ed eseguono i compiti componenti in parallelo, migliorando la tua gestione del contesto. Ogni subagent opera nella propria finestra di contesto isolata.

## Come funziona

Gestire il contesto in Claude Code è importante. Molto della finestra di contesto viene consumato da cose come chiamate a strumenti che esplorano il tuo codebase o eseguono ricerche web. Ciò che Claude scopre durante quell'esplorazione non è sempre rilevante per la funzionalità principale che stai sviluppando.

È qui che entrano in gioco i subagent. Claude avvia un subagent per gestire un compito come "esplora questo codebase per me." Il subagent gira in parallelo con la propria finestra di contesto, fa tutto il lavoro di esplorazione, e una volta finito, riassume i suoi risultati e restituisce quel riepilogo a Claude.

Il risultato: ottieni la risposta che cercavi, senza che l'intero percorso per arrivarci ingombri il tuo contesto principale.

## Creare il tuo subagent

I subagent sono definiti in file Markdown con frontmatter YAML. Il modo più semplice per iniziare è lasciare che Claude ne generi uno per te. Esegui:

```
/agents
```

Poi seleziona "Crea nuovo agente." Percorrerai dei passaggi che includono la scelta dell'ambito dell'agente, la definizione del suo scopo, la selezione degli strumenti a cui ha accesso, e persino la scelta di un colore per esso.

Claude genererà un nome, una descrizione e un prompt per il subagent. Questo dice anche a Claude quando chiamare il subagent in base ai prompt che gli dai.

## Ulteriore personalizzazione

I subagent possono essere personalizzati ulteriormente. Ecco alcuni punti salienti:

- La **memoria persistente** permette al tuo subagent di mantenere la memoria tra le conversazioni. Ottimo se lo usi costantemente sugli stessi progetti.
- **Precarica le skill** nei subagent aggiungendo la chiave skill ed elencando le skill per nome. Nota che a differenza delle skill nella tua conversazione principale, qui l'intera skill viene caricata nel contesto.

## Riepilogo

Mantenere pulita la finestra di contesto è uno dei modi migliori per rimanere produttivi con Claude Code. Con i subagent, puoi far girare un agente in background per gestire il lavoro pesante e restituire solo la risposta alla tua finestra di contesto principale.
</script>

<script type="text/markdown" data-id="4.3" data-ch="4" data-title="Skill">
# 4.3 Skill

[Video](https://www.youtube.com/watch?v=bjdBVZa66oU)

Ogni volta che spieghi gli standard di codifica del tuo team a Claude, ti stai ripetendo. Ogni revisione di PR, ridescrivi come vuoi che sia strutturato il feedback. Ogni messaggio di commit, ricordi a Claude il tuo formato preferito. Le Skill risolvono questo problema. Una skill è un file markdown che insegna a Claude come fare qualcosa una volta sola, e Claude poi applica quella conoscenza automaticamente ogni volta che è rilevante.

## Cosa sono le skill? (3 min)

Le Skill sono file markdown riutilizzabili che insegnano a Claude Code come gestire automaticamente compiti specifici. Invece di ripetere le istruzioni ogni volta che chiedi a Claude di revisionare una PR o scrivere un messaggio di commit, scrivi una skill una volta e Claude la applica ogni volta che il compito si ripresenta.

**Punti chiave**

- Le Skill sono cartelle di istruzioni che Claude Code può scoprire e usare per gestire i compiti in modo più accurato. Ogni skill vive in un file SKILL.md con un nome e una descrizione nel suo frontmatter.
- Claude usa la descrizione per abbinare le skill alle richieste. Quando chiedi a Claude di fare qualcosa, confronta la tua richiesta con le descrizioni delle skill disponibili e attiva quelle che corrispondono.
- Le skill personali vanno in ~/.claude/skills e ti seguono in tutti i progetti. Le skill di progetto vanno in .claude/skills dentro un repository e sono condivise con chiunque lo clona.
- Le skill si caricano su richiesta — a differenza di CLAUDE.md (che si carica in ogni conversazione) o degli slash command (che richiedono un'invocazione esplicita), le skill si attivano automaticamente quando Claude riconosce la situazione.
- Se ti ritrovi a spiegare la stessa cosa a Claude ripetutamente, quella è una skill in attesa di essere scritta.

### Cosa sono le Skill

Le Skill sono cartelle di istruzioni e risorse che Claude Code può scoprire e usare per gestire i compiti in modo più accurato. Ogni skill vive in un file SKILL.md con un nome e una descrizione nel suo frontmatter.

La descrizione è come Claude decide se usare la skill. Quando chiedi a Claude di revisionare una PR, confronta la tua richiesta con le descrizioni delle skill disponibili e trova quella rilevante. Claude legge la tua richiesta, la confronta con tutte le descrizioni delle skill disponibili, e attiva quelle che corrispondono.

Ecco come appare il frontmatter di una skill:

```
---
name: pr-review
description: Revisiona le pull request per la qualità del codice. Usa quando revisioni PR o controlli modifiche al codice.
---
```

Sotto il frontmatter, scrivi le istruzioni vere e proprie — la tua checklist di revisione, le preferenze di formattazione, o qualsiasi cosa Claude debba sapere per quel compito.

### Dove vivono le Skill

Puoi conservare le skill in posti diversi a seconda di chi ne ha bisogno:

- Le **skill personali** vanno in ~/.claude/skills (la tua home directory). Ti seguono in tutti i tuoi progetti — il tuo stile di messaggi di commit, il tuo formato di documentazione, come preferisci che il codice venga spiegato.
- Le **skill di progetto** vanno in .claude/skills dentro la directory radice del tuo repository. Chiunque clona il repo ottiene queste skill automaticamente. È qui che vivono gli standard del team, come le linee guida del brand della tua azienda, i font e i colori preferiti per il design web.
- Su Windows, le skill personali vivono in C:/Users/tuo-utente/.claude/skills.

Le skill di progetto vengono incluse nel controllo versione insieme al tuo codice, così tutto il team le condivide.

### Skill vs. CLAUDE.md vs. Slash Command

Claude Code ha diversi modi per personalizzare il comportamento. Le Skill sono uniche perché sono automatiche e specifiche per compito. Ecco come si confrontano:

- I file **CLAUDE.md** si caricano in ogni conversazione. Se vuoi che Claude usi sempre la modalità strict di TypeScript, quello va in CLAUDE.md.
- Le **Skill** si caricano su richiesta quando corrispondono alla tua richiesta. Claude carica inizialmente solo il nome e la descrizione, così non riempiono l'intera finestra di contesto. La tua checklist di revisione PR non deve essere nel contesto quando stai facendo debug — si carica quando effettivamente richiedi una revisione.
- Gli **slash command** richiedono che tu li digiti esplicitamente. Le skill no — Claude le applica quando riconosce la situazione.

### Quando usare le Skill

Le Skill funzionano meglio per conoscenza specializzata che si applica a compiti specifici:

- Standard di revisione del codice che il tuo team segue
- Formati di messaggi di commit che preferisci
- Linee guida del brand per la tua organizzazione
- Modelli di documentazione per tipi specifici di documenti
- Checklist di debug per framework particolari

La regola generale è semplice: se ti ritrovi a spiegare la stessa cosa a Claude ripetutamente, quella è una skill in attesa di essere scritta.

## Creare la tua prima skill (4 min)

**Punti chiave**

- Una skill è una directory contenente un file SKILL.md con metadati (nome, descrizione) nel frontmatter e istruzioni sotto.
- Claude carica solo i nomi e le descrizioni delle skill all'avvio, poi confronta le richieste in arrivo con quelle descrizioni usando un abbinamento semantico.
- Ottieni una richiesta di conferma prima che Claude carichi il contenuto completo della skill nel contesto.
- Priorità per i conflitti di nome: Enterprise → Personale → Progetto → Plugin.
- Per aggiornare una skill, modifica il suo SKILL.md. Per rimuoverne una, elimina la sua directory. Riavvia sempre Claude Code perché le modifiche abbiano effetto.

### Creare una Skill

Costruiremo una skill personale che insegna a Claude come scrivere descrizioni di PR in un formato coerente. Poiché è una skill personale, vive nella tua home directory e funziona in tutti i tuoi progetti.

Prima, crea una directory per la tua skill dentro la cartella skills. Il nome della directory dovrebbe corrispondere al nome della tua skill:

```
mkdir -p ~/.claude/skills/pr-description
```

Poi crea un file SKILL.md dentro quella directory. Il file ha due parti separate dai trattini del frontmatter:

```
---
name: pr-description
description: Scrive descrizioni di pull request. Usa quando crei una PR, scrivi una PR, o quando l'utente chiede di riassumere le modifiche per una pull request.
---

Quando scrivi una descrizione di PR:

1. Esegui `git diff main...HEAD` per vedere tutte le modifiche su questo branch
2. Scrivi una descrizione seguendo questo formato:

## Cosa
Una frase che spiega cosa fa questa PR.

## Perché
Breve contesto sul perché questa modifica è necessaria

## Modifiche
- Punti elenco delle modifiche specifiche apportate
- Raggruppa le modifiche correlate insieme
- Menziona eventuali file eliminati o rinominati
```

Il nome identifica la tua skill. La descrizione dice a Claude quando usarla — questo è il criterio di abbinamento. Tutto ciò che segue il secondo set di trattini sono le istruzioni che Claude segue quando la skill viene attivata.

### Testare la tua Skill

Claude Code carica le skill all'avvio, quindi riavvia la tua sessione dopo averne creata una. Puoi verificare che sia disponibile controllando l'elenco delle skill disponibili. Dovresti vedere la tua skill elencata. Per testarla, fai alcune modifiche su un branch e di' qualcosa come "scrivi una descrizione di PR per le mie modifiche." Claude indicherà che sta usando la skill di descrizione PR, controllerà il tuo diff, e scriverà una descrizione seguendo il tuo modello — stesso formato ogni volta.

### Come funziona l'abbinamento delle Skill

Quando Claude Code si avvia, scansiona quattro posizioni per le skill ma carica solo il nome e la descrizione — non il contenuto completo. Questo è un dettaglio importante.

Quando invii una richiesta, Claude confronta il tuo messaggio con le descrizioni di tutte le skill disponibili. Per esempio, "spiega cosa fa questa funzione" corrisponderebbe a una skill descritta come "spiega il codice con diagrammi visivi" perché l'intento si sovrappone.

Una volta trovata una corrispondenza, Claude ti chiede di confermare il caricamento della skill. Questo passaggio di conferma ti mantiene consapevole di quale contesto Claude sta importando. Dopo la tua conferma, Claude legge il file SKILL.md completo e ne segue le istruzioni.

### Priorità delle Skill

Se cloni un repository che ha una skill con lo stesso nome di una delle tue skill personali, quale vince? C'è un ordine di priorità chiaro:

1. **Enterprise** — impostazioni gestite, priorità più alta
2. **Personale** — la tua home directory (~/.claude/skills)
3. **Progetto** — la directory .claude/skills dentro un repository
4. **Plugin** — plugin installati, priorità più bassa

Questo permette alle organizzazioni di far rispettare gli standard tramite skill enterprise pur continuando a consentire la personalizzazione individuale. Se la tua azienda ha una skill enterprise "code-review" e crei una skill personale "code-review" con lo stesso nome, la versione enterprise ha la precedenza.

Per evitare conflitti, usa nomi descrittivi. Invece di semplicemente "review," usa qualcosa come "frontend-review" o "backend-review."

### Aggiornare ed eliminare le Skill

Per aggiornare una skill, modifica il suo file SKILL.md. Per rimuoverne una, elimina la sua directory. Riavvia Claude Code dopo qualsiasi modifica perché abbia effetto.

## Risoluzione dei problemi delle skill (4 min)

Quando le skill non funzionano come previsto, il problema di solito rientra in una di poche categorie: la skill non si attiva, non si carica, ha conflitti, o fallisce in esecuzione. La buona notizia è che la maggior parte delle correzioni sono piuttosto semplici.

**Punti chiave**

- Inizia con lo strumento validatore delle skill — individua problemi strutturali prima che tu perda tempo a fare debug di altre cose.
- Se una skill non si attiva, la causa è quasi sempre la descrizione — aggiungi frasi trigger che corrispondano a come formuli davvero le richieste.
- Se una skill non si carica, controlla che SKILL.md sia dentro una directory con nome (non alla radice delle skill) e che il nome del file sia esattamente SKILL.md.
- Se viene usata la skill sbagliata, le tue descrizioni sono troppo simili — rendile più distinte.
- Per errori di runtime, controlla le dipendenze, i permessi dei file (chmod +x), e i separatori di percorso (usa le barre in avanti ovunque).

### Usa il validatore delle Skill

La prima cosa da provare è il comando di verifica delle agent skill. I passaggi di installazione variano a seconda del sistema operativo, ma usare uv è il modo più semplice per configurarlo rapidamente. Una volta installato, naviga alla tua directory skill oppure esegui il comando da qualsiasi posizione. Il validatore individuerà problemi strutturali prima che tu perda tempo a fare debug di altre cose.

### La Skill non si attiva

La tua skill esiste e supera la validazione, ma Claude non la usa quando te lo aspetti. La causa è quasi sempre la descrizione. Claude usa un abbinamento semantico, quindi la tua richiesta deve sovrapporsi al significato della descrizione. Se non c'è abbastanza sovrapposizione, nessuna corrispondenza. Ecco cosa fare:

- Controlla la tua descrizione rispetto a come formuli effettivamente le richieste
- Aggiungi frasi trigger che gli utenti direbbero davvero
- Testa con variazioni come "aiutami a profilare questo," "perché questo è lento?", "rendi questo più veloce"
- Se qualche variazione non attiva la skill, aggiungi quelle parole chiave alla tua descrizione

### La Skill non si carica

Se la tua skill non appare quando chiedi a Claude "quali skill sono disponibili," controlla questi requisiti strutturali:

- Il file SKILL.md deve essere dentro una directory con nome, non alla radice delle skill
- Il nome del file deve essere esattamente SKILL.md — tutto maiuscolo per "SKILL", minuscolo "md"

Esegui claude --debug per vedere gli errori di caricamento. Cerca messaggi che menzionano il nome della tua skill. A volte questo da solo ti indica direttamente il problema.

### Viene usata la skill sbagliata

Se Claude usa la skill sbagliata o sembra confuso tra le skill, le tue descrizioni sono probabilmente troppo simili. Rendile distinte. Essere il più specifici possibile non aiuta solo Claude a decidere quando usare la tua skill — previene anche conflitti con altre skill dal suono simile.

### Conflitti di priorità delle Skill

Se la tua skill personale viene ignorata, una skill enterprise o di priorità più alta potrebbe avere lo stesso nome. Per esempio, se c'è una skill enterprise "code-review" e hai anche una skill personale "code-review," quella enterprise vince sempre. Le tue opzioni:

- Rinomina la tua skill in qualcosa di più distinto (di solito è il percorso più semplice)
- Parla con il tuo amministratore della skill enterprise

### Le skill dei plugin non appaiono

Hai installato un plugin ma non vedi le sue skill? Svuota la cache, riavvia Claude Code, e reinstalla. Se le skill continuano a non apparire dopo questo, la struttura del plugin potrebbe essere sbagliata. Questo è il momento in cui lo strumento validatore si rivela davvero utile.

### Errori di runtime

La skill si carica ma fallisce durante l'esecuzione. Alcune cause comuni:

- **Dipendenze mancanti:** se la tua skill usa pacchetti esterni, devono essere installati. Aggiungi informazioni sulle dipendenze alla descrizione della tua skill così Claude sa cosa serve.
- **Problemi di permessi:** gli script hanno bisogno del permesso di esecuzione. Esegui chmod +x su qualsiasi script a cui la tua skill fa riferimento.
- **Separatori di percorso:** usa le barre in avanti ovunque, anche su Windows.

### Checklist rapida di risoluzione dei problemi

- **Non si attiva?** Migliora la tua descrizione e aggiungi frasi trigger.
- **Non si carica?** Controlla il percorso, il nome del file e la sintassi YAML.
- **Viene usata la skill sbagliata?** Rendi le descrizioni più distinte tra loro.
- **Viene oscurata?** Controlla la gerarchia di priorità e rinomina se necessario.
- **Skill dei plugin mancanti?** Svuota la cache e reinstalla.
- **Fallimento a runtime?** Controlla dipendenze, permessi e percorsi.
</script>

<script type="text/markdown" data-id="4.4" data-ch="4" data-title="MCP">
# 4.4 MCP

Il Model Context Protocol (MCP) è uno standard aperto che permette a Claude Code di collegarsi a strumenti e fonti di dati esterne. Quando fai una domanda, Claude capisce automaticamente quando dovrebbe usare quegli strumenti per gestire meglio la tua richiesta.

Molto del tuo contesto vive fuori dal tuo codebase — in database, app di produttività, o repository pubblici. MCP colma questo divario.

## Cosa puoi fare con esso?

Prima di tutto, è importante capire il concetto di "strumenti" nell'IA agentica. Gli strumenti danno ad agenti come Claude Code la capacità di eseguire azioni che li aiutano a completare i compiti in modo più efficace. Questo è diverso dall'IA tipica, dove ottieni solo una risposta testuale.

Per esempio, se il tuo team usa Linear per la gestione dei progetti, puoi aggiungere un server MCP Linear per portare i dettagli delle tue issue specifiche. Se hai bisogno di documentazione aggiornata per una dipendenza, un server MCP di documentazione come Context7 può fornirla a Claude Code.

> Claude Code che interroga un server MCP Linear per recuperare i dettagli dell'issue per il ticket MEN-12. Claude Code che usa il server MCP Context7 per cercare la documentazione più recente di shadcn/ui.

## Aggiungere un server MCP

Puoi aggiungere server MCP con il comando `claude mcp add`. Ci sono due tipi principali:

> Esecuzione di `claude mcp add` per aggiungere un server MCP Linear HTTP dal terminale.

- I **server HTTP** sono per servizi remoti. Sono ospitati dal fornitore del servizio e si collegano tramite rete.
- I **server Stdio** sono per processi locali che girano sulla tua macchina.

> Esecuzione di `claude mcp add` per aggiungere un server MCP stdio locale con uno script Python.

Puoi gestire i tuoi server con `/mcp` dentro una sessione di Claude Code per vedere cosa è connesso, controllare lo stato, e disattivare i server che non ti servono.

> Il comando `/mcp` che mostra i server MCP connessi e il loro stato.

## Definire l'ambito dei server

I server MCP possono avere l'ambito definito in tre modi:

- **Locale** — disponibile solo nel progetto corrente, solo per te.
- **Utente** — disponibile in tutti i tuoi progetti.
- **Progetto** — usa un file `.mcp.json` che includi nel controllo versione così chiunque lavori sul codebase ottiene automaticamente esattamente gli stessi server.

## Costi di contesto

I server MCP aggiungono definizioni di strumenti alla tua finestra di contesto — anche quando non li stai usando attivamente. Se hai molti server configurati, questo consuma il tuo contesto disponibile. Esegui `/mcp` per vedere cosa è connesso e disattiva tutto ciò che non stai usando attivamente.

> La vista dettagliata del server `/mcp` con opzioni per vedere gli strumenti, riconnettere, o disattivare un server.

Se uno strumento ha un equivalente CLI (come `gh` per GitHub o `aws` per AWS), la CLI è più efficiente in termini di contesto perché non aggiunge definizioni di strumenti persistenti.

Potresti anche beneficiare dall'uso di una Skill. Una Skill ha un nome e una descrizione caricati nel contesto, e Claude carica il contenuto completo della skill solo quando determina di doverla usare.

Se i tuoi strumenti MCP superano il 10% della tua finestra di contesto, Claude Code passa automaticamente alla modalità di ricerca strumenti, che scopre gli strumenti giusti su richiesta — anche se questo potrebbe non funzionare in modo altrettanto affidabile.

## Riepilogo

MCP collega Claude Code ai tuoi strumenti e fonti di dati esterne. Aggiungi server con `claude mcp add`. Definisci il loro ambito al tuo progetto con `.mcp.json` così il tuo team li ottiene automaticamente. E tieni d'occhio l'uso del contesto disattivando i server che non stai usando attivamente.
</script>

<script type="text/markdown" data-id="4.5" data-ch="4" data-title="Hook">
# 4.5 Hook

Gli hook ti permettono di eseguire comandi in punti specifici del ciclo di vita di Claude Code. La differenza chiave tra gli hook e tutto il resto trattato in questo corso è che gli hook sono deterministici — vengono sempre eseguiti.

## Perché usare gli Hook

Puoi dire a Claude nel tuo CLAUDE.md di eseguire Prettier dopo ogni modifica ai file. Il più delle volte lo farà. Ma a volte no. Un hook lo fa succedere ogni singola volta, senza eccezioni.

I casi d'uso comuni includono:

- Formattazione automatica dopo le modifiche ai file
- Registrazione di tutti i comandi eseguiti per conformità
- Blocco di operazioni pericolose come la modifica di file di produzione
- Invio di notifiche a te stesso quando Claude finisce un compito

## Come funzionano

Gli hook sono configurati nel tuo `settings.json`. Scegli un evento, imposti opzionalmente un matcher per a quali strumenti si applica, e fornisci un comando da eseguire. Gli eventi disponibili sono:

- **PreToolUse** — viene eseguito prima di una chiamata a uno strumento
- **PostToolUse** — viene eseguito dopo che una chiamata a uno strumento è completata
- **UserPromptSubmit** — viene eseguito quando invii un prompt, prima che Claude lo elabori
- **Stop** — viene eseguito quando Claude finisce di rispondere
- **Notification** — viene eseguito quando Claude invia una notifica

Li configuri tramite il comando `/hooks` dentro Claude Code, o modificando direttamente `settings.json`.

> Il file `settings.json` dentro la directory `.claude` con la configurazione degli hook.

## Un esempio pratico

L'hook più comune: formattazione automatica dopo le modifiche. Imposta un hook `PostToolUse` con un matcher di `"Edit|MultiEdit|Write"` così si attiva ogni volta che Claude modifica un file. Il comando controlla l'estensione del file ed esegue il formattatore appropriato — Prettier per TypeScript, gofmt per Go, qualunque cosa usi il tuo progetto.

## Bloccare con PreToolUse

Gli hook `PreToolUse` possono bloccare le chiamate agli strumenti prima che vengano eseguite. Il tuo hook riceve il nome dello strumento e l'input come JSON su stdin. Il codice di uscita determina il comportamento:

- **Codice di uscita 0** — procedi normalmente.
- **Codice di uscita 2** — blocca l'azione. Il messaggio stderr viene restituito a Claude come feedback così sa perché è stato bloccato e può adattarsi.
- **Qualsiasi altro codice di uscita** — un errore non bloccante che ti viene mostrato ma non ferma nulla.

Questo è come applichi regole rigide. Blocca le scritture in una directory di configurazione di produzione. Blocca i comandi bash che contengono `rm -rf`. Blocca i commit su main. Qualunque cosa il tuo team abbia bisogno che sia garantita, non solo suggerita.

> Un file `settings.json` che mostra hook `PreToolUse` e `PostToolUse` con matcher e comandi.

## Condividere gli Hook con il tuo team

Gli hook configurati in `.claude/settings.json` sono a livello di progetto e possono essere inclusi nel controllo versione del tuo repository. Questo significa che tutto il tuo team ottiene automaticamente gli stessi hook. Usa la variabile d'ambiente `CLAUDE_PROJECT_DIR` nei tuoi comandi per referenziare script conservati nel tuo progetto, così funzionano indipendentemente dalla directory di lavoro corrente di Claude.

## Riepilogo

Gli hook ti danno controllo deterministico sul comportamento di Claude Code. Usa `PostToolUse` per formattazione automatica e registrazione. Usa `PreToolUse` per bloccare operazioni pericolose. Configurali con `/hooks` o in `settings.json`. E includili nel tuo repository così anche il tuo team li ottiene.

Se qualcosa deve succedere ogni volta senza fallire, non metterlo in un prompt. Mettilo in un hook.
</script>

             title:b.getAttribute('data-title'), md:b.textContent };
  });
  var byId = {}; lessons.forEach(function(l){ byId[l.id]=l; });

  // ---- minimal markdown renderer ----
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function inline(s){
    s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)[^)]*\)/g,'<img alt="$1" src="$2" loading="lazy">');
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)[^)]*\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    s = s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*\n]+)\*/g,'$1<em>$2</em>');
    return s;
  }
  function render(src){
    var lines = String(src).replace(/\r\n/g,'\n').split('\n');
    var out=[], i=0;
    while(i<lines.length && lines[i].trim()==='') i++;
    if(i<lines.length && /^#\s+/.test(lines[i])) i++;   // drop leading H1 (shown as page title)
    while(i<lines.length){
      var line=lines[i];
      if(line.trim()===''){ i++; continue; }
      var fence=line.match(/^(\s*)```(.*)$/);
      if(fence){
        var pad=fence[1].length; i++; var code=[];
        while(i<lines.length && !/^\s*```/.test(lines[i])){ code.push(lines[i].slice(pad)); i++; }
        i++;
        out.push('<pre><code>'+esc(code.join('\n'))+'</code></pre>');
        continue;
      }
      var h=line.match(/^(#{1,6})\s+(.*)$/);
      if(h){ var lv=h[1].length; out.push('<h'+lv+'>'+inline(esc(h[2]))+'</h'+lv+'>'); i++; continue; }
      if(/^>\s?/.test(line)){
        var bq=[];
        while(i<lines.length && /^>\s?/.test(lines[i])){ bq.push(lines[i].replace(/^>\s?/,'')); i++; }
        out.push('<blockquote>'+render(bq.join('\n'))+'</blockquote>');
        continue;
      }
      if(/^\s*[-*]\s+/.test(line)){
        var ui=[];
        while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ ui.push(lines[i].replace(/^\s*[-*]\s+/,'')); i++; }
        out.push('<ul>'+ui.map(function(t){return '<li>'+inline(esc(t))+'</li>';}).join('')+'</ul>');
        continue;
      }
      if(/^\s*\d+\.\s+/.test(line)){
        var oi=[];
        while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ oi.push(lines[i].replace(/^\s*\d+\.\s+/,'')); i++; }
        out.push('<ol>'+oi.map(function(t){return '<li>'+inline(esc(t))+'</li>';}).join('')+'</ol>');
        continue;
      }
      var para=[line]; i++;
      while(i<lines.length && lines[i].trim()!=='' &&
            !/^(\s*#{1,6}\s|>|\s*[-*]\s|\s*\d+\.\s|\s*```)/.test(lines[i])){ para.push(lines[i]); i++; }
      out.push('<p>'+inline(esc(para.join(' ')))+'</p>');
    }
    var html=out.join('\n');
    if(html.replace(/\s/g,'')==='') html='<p class="empty">Questa lezione del corso non ha note di testo. Guarda il video o consulta la documentazione ufficiale.</p>';
    return html;
  }

  // ---- build sidebar ----
  var side=document.getElementById('side');
  var order=[], curCh=null, grp=null;
  lessons.forEach(function(l){
    if(l.ch!==curCh){
      curCh=l.ch;
      grp=document.createElement('div'); grp.className='grp';
      var h=document.createElement('h3'); h.textContent=CHAP[l.ch]||('Capitolo '+l.ch); grp.appendChild(h);
      side.appendChild(grp);
    }
    var a=document.createElement('a'); a.href='#'+l.id; a.dataset.id=l.id;
    a.innerHTML='<span class="n">'+l.id+'</span><span class="t">'+l.title.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</span>';
    grp.appendChild(a);
    order.push(l.id);
  });

  var crumbEl=document.getElementById('crumb'),
      titleEl=document.getElementById('title'),
      contentEl=document.getElementById('content'),
      pagerEl=document.getElementById('pager');

  function show(id){
    var l=byId[id]||byId[order[0]];
    crumbEl.textContent=CHAP[l.ch]||('Capitolo '+l.ch);
    titleEl.textContent=l.id+' · '+l.title;
    contentEl.innerHTML=render(l.md);
    document.title='Claude Code 101 — '+l.title;
    Array.prototype.forEach.call(side.querySelectorAll('a'),function(a){
      a.classList.toggle('active', a.dataset.id===l.id);
    });
    var active=side.querySelector('a.active');
    if(active && active.scrollIntoView) active.scrollIntoView({block:'nearest'});
    // pager
    var idx=order.indexOf(l.id);
    pagerEl.innerHTML='';
    if(idx>0){ var p=byId[order[idx-1]];
      pagerEl.insertAdjacentHTML('beforeend','<a class="prev" href="#'+p.id+'"><span class="dir">← precedente</span><span class="ttl">'+p.id+' '+p.title+'</span></a>');
    } else { pagerEl.insertAdjacentHTML('beforeend','<span class="spacer"></span>'); }
    if(idx<order.length-1){ var n=byId[order[idx+1]];
      pagerEl.insertAdjacentHTML('beforeend','<a class="next" href="#'+n.id+'"><span class="dir">successiva →</span><span class="ttl">'+n.id+' '+n.title+'</span></a>');
    } else { pagerEl.insertAdjacentHTML('beforeend','<span class="spacer"></span>'); }
    document.body.classList.remove('navopen');
    document.getElementById('side').classList.remove('open');
    window.scrollTo(0,0);
  }

  function current(){ return (location.hash||'').replace(/^#/,''); }
  window.addEventListener('hashchange', function(){ show(current()); });
  show(current());

  // ---- theme toggle ----
  var root=document.documentElement;
  root.setAttribute('data-theme',matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.getElementById('themebtn').addEventListener('click',function(){
    var dark=matchMedia('(prefers-color-scheme:dark)').matches;
    var cur=root.getAttribute('data-theme')||(dark?'dark':'light');
    root.setAttribute('data-theme', cur==='dark'?'light':'dark');
  });
  // ---- mobile nav ----
  document.getElementById('menubtn').addEventListener('click',function(){
    var s=document.getElementById('side');
    s.classList.toggle('open');
    document.body.classList.toggle('navopen', s.classList.contains('open'));
  });
})();
</script>
</body>
</html>
